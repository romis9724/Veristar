version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: veristar
      POSTGRES_USER: veristar
      POSTGRES_PASSWORD: veristar
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veristar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
