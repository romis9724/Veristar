<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Veristar{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    :root {
      --bg: oklch(98% 0.004 90);
      --surface: oklch(100% 0 0);
      --ink: oklch(22% 0.01 260);
      --muted: oklch(55% 0.01 260);
      --line: oklch(90% 0.005 260);
      --accent: oklch(55% 0.16 265);
      --official: oklch(58% 0.14 150);
      --reported: oklch(70% 0.14 75);
      --rumor: oklch(65% 0.01 260);
      --sans: ui-sans-serif, "Pretendard", system-ui, sans-serif;
      --mono: ui-monospace, "JetBrains Mono", SFMono-Regular, monospace;
      --space: clamp(1rem, 0.6rem + 1.6vw, 2rem);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: var(--sans); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.site {
      border-bottom: 1px solid var(--line); padding: 1rem var(--space);
      display: flex; align-items: baseline; gap: 0.75rem;
    }
    header.site .logo { font-weight: 700; letter-spacing: -0.02em; font-size: 1.25rem; }
    header.site .tag { color: var(--muted); font-size: 0.8rem; font-family: var(--mono); }
    main { max-width: 60rem; margin: 0 auto; padding: var(--space); }
    .qid { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
    .badge {
      display: inline-block; font-family: var(--mono); font-size: 0.7rem;
      padding: 0.1rem 0.45rem; border-radius: 999px; border: 1px solid currentColor;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge.OFFICIAL { color: var(--official); }
    .badge.REPORTED { color: var(--reported); }
    .badge.RUMOR { color: var(--rumor); }
    .type-badge {
      font-size: 0.7rem; font-family: var(--mono); color: var(--muted);
      border: 1px solid var(--line); border-radius: 4px; padding: 0.05rem 0.4rem;
    }
    .search input {
      width: 100%; padding: 0.8rem 1rem; font-size: 1.05rem;
      border: 1px solid var(--line); border-radius: 10px; background: var(--surface);
      font-family: var(--sans);
    }
    .search input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    ul.results { list-style: none; padding: 0; margin: 1rem 0; display: grid; gap: 0.5rem; }
    ul.results li {
      background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
      padding: 0.7rem 0.9rem; display: flex; align-items: center; gap: 0.6rem;
      transition: transform 150ms cubic-bezier(0.16,1,0.3,1), border-color 150ms;
    }
    ul.results li:hover { transform: translateX(3px); border-color: var(--accent); }
    .entity-head h1 { font-size: clamp(1.6rem, 1rem + 2vw, 2.6rem); margin: 0.2rem 0; letter-spacing: -0.02em; }
    .meta { color: var(--muted); font-size: 0.85rem; }
    table.rel { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    table.rel th, table.rel td { text-align: left; padding: 0.55rem 0.5rem; border-bottom: 1px solid var(--line); vertical-align: top; }
    table.rel th { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
    .pred { font-family: var(--mono); font-size: 0.82rem; }
    .dir { color: var(--muted); font-size: 0.75rem; }
    .src a { font-size: 0.78rem; }
    .empty { color: var(--muted); padding: 1.5rem 0; }
    footer { color: var(--muted); font-size: 0.75rem; padding: var(--space); border-top: 1px solid var(--line); margin-top: 2rem; }
  </style>
</head>
<body>
  <header class="site">
    <a href="/" class="logo">Veristar</a>
    <span class="tag">provenance-graded knowledge graph</span>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>모든 사실은 출처와 등급을 가진다 · OFFICIAL / REPORTED / RUMOR</footer>
</body>
</html>
