{% extends "base.html" %}
{% block title %}그래프 탐색기 · Veristar{% endblock %}
{% block content %}
<style>
  /* 그래프 페이지는 full-height, main의 max-width 해제 */
  main { max-width: none; padding: 0; }
  .graph-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: calc(100vh - 57px);
  }
  /* 왼쪽: 트리 패널 */
  .tree-panel {
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 0.8rem 0;
    background: var(--surface);
    font-size: 0.82rem;
  }
  .tree-panel h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); padding: 0 0.9rem; margin: 0.6rem 0 0.3rem;
  }
  .tree-group { margin-bottom: 0.5rem; }
  .tree-group summary {
    cursor: pointer; padding: 0.25rem 0.9rem; font-weight: 600;
    user-select: none; list-style: none; display: flex; align-items: center; gap: 0.4rem;
  }
  .tree-group summary::-webkit-details-marker { display: none; }
  .tree-group summary::before { content: '▶'; font-size: 0.6rem; color: var(--muted); transition: transform 150ms; }
  .tree-group[open] summary::before { transform: rotate(90deg); }
  .tree-item {
    display: block; padding: 0.22rem 0.9rem 0.22rem 1.8rem;
    cursor: pointer; border-radius: 0; color: var(--ink);
    transition: background 100ms;
  }
  .tree-item:hover { background: oklch(94% 0.01 265); }
  .tree-item.active { background: oklch(92% 0.04 265); color: var(--accent); font-weight: 600; }
  .type-icon { font-size: 0.85rem; }
  .count-badge { font-size: 0.65rem; color: var(--muted); margin-left: auto; }
  /* 필터 영역 */
  .graph-filters {
    padding: 0.5rem 0.9rem;
    border-bottom: 1px solid var(--line);
    font-size: 0.75rem;
  }
  .graph-filters label { margin-right: 0.8rem; cursor: pointer; }
  /* 그래프 캔버스 */
  .graph-canvas {
    position: relative;
    overflow: hidden;
    background: oklch(99% 0.002 260);
  }
  #graph-svg { width: 100%; height: 100%; }
  .tooltip {
    position: absolute; background: var(--surface); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.78rem;
    pointer-events: none; display: none; max-width: 200px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1); z-index: 10;
  }
  .tooltip strong { display: block; margin-bottom: 0.2rem; }
  /* 범례 */
  .legend {
    position: absolute; bottom: 1rem; left: 1rem;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.6rem 0.8rem; font-size: 0.72rem;
    display: grid; gap: 0.25rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  /* 상세 패널 */
  .detail-panel {
    position: absolute; right: 0; top: 0; bottom: 0; width: 280px;
    background: var(--surface); border-left: 1px solid var(--line);
    padding: 1rem; overflow-y: auto; display: none; font-size: 0.82rem;
  }
  .detail-panel.open { display: block; }
  .detail-close { float: right; cursor: pointer; color: var(--muted); font-size: 1rem; }
  .stat-row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid var(--line); }
</style>

<div class="graph-layout">
  <!-- 왼쪽 트리 -->
  <div class="tree-panel" id="tree-panel">
    <h3>엔티티 유형</h3>
    <div id="tree-root"></div>
    <div class="graph-filters" style="margin-top:0.8rem">
      <div style="font-weight:600;margin-bottom:0.4rem">등급 필터</div>
      <label><input type="checkbox" name="grade" value="OFFICIAL" checked> OFFICIAL</label><br>
      <label><input type="checkbox" name="grade" value="REPORTED"> REPORTED</label>
    </div>
  </div>

  <!-- 그래프 캔버스 -->
  <div class="graph-canvas" id="graph-canvas">
    <svg id="graph-svg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="legend" id="legend"></div>
    <!-- 엔티티 상세 패널 -->
    <div class="detail-panel" id="detail-panel">
      <span class="detail-close" onclick="closeDetail()">✕</span>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<script src="/static/d3.min.js"></script>
<script>
const TYPE_COLOR = {
  Person:       "#4CAF50",
  Group:        "#2196F3",
  Organization: "#FF9800",
  Work:         "#9C27B0",
  Award:        "#F44336",
  Event:        "#00BCD4",
};
const TYPE_ICON = {
  Person: "👤", Group: "🎵", Organization: "🏢",
  Work: "🎵", Award: "🏆", Event: "📅",
};
const PRED_COLOR = {
  memberOf: "#1565C0", affiliatedWith: "#E65100",
  wonAward: "#6A1B9A", nominatedFor: "#880E4F",
  appearedIn: "#2E7D32", released: "#4527A0",
  collaboratedWith: "#00695C",
};

let simulation, allNodes = [], allLinks = [], activeType = null;
const svg = d3.select("#graph-svg");
const canvas = document.getElementById("graph-canvas");
const tooltip = document.getElementById("tooltip");

// zoom 설정
const zoom = d3.zoom()
  .scaleExtent([0.1, 5])
  .on("zoom", e => container.attr("transform", e.transform));

svg.call(zoom);
const container = svg.append("g");

async function loadGraph() {
  const gradeChecked = [...document.querySelectorAll('[name=grade]:checked')].map(e => e.value);
  const params = new URLSearchParams();
  gradeChecked.forEach(g => params.append("grade", g));
  if (activeType) params.set("entity_type", activeType);

  const res = await fetch(`/api/graph/data?${params}`);
  const data = (await res.json()).data;
  renderGraph(data.nodes, data.links);
}

function renderGraph(nodes, links) {
  allNodes = nodes;
  allLinks = links;

  container.selectAll("*").remove();

  const W = canvas.clientWidth, H = canvas.clientHeight;

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(90).strength(0.5))
    .force("charge", d3.forceManyBody().strength(-260))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collision", d3.forceCollide(22));

  // 링크
  const link = container.append("g").selectAll("line")
    .data(links).join("line")
    .attr("stroke", d => PRED_COLOR[d.predicate] || "#aaa")
    .attr("stroke-opacity", 0.55)
    .attr("stroke-width", d => d.grade === "OFFICIAL" ? 2 : 1)
    .attr("stroke-dasharray", d => d.grade === "OFFICIAL" ? null : "4,3");

  // 링크 라벨
  const linkLabel = container.append("g").selectAll("text")
    .data(links).join("text")
    .attr("font-size", "8px")
    .attr("fill", "#888")
    .attr("text-anchor", "middle")
    .text(d => d.predicate);

  // 노드
  const node = container.append("g").selectAll("g")
    .data(nodes).join("g")
    .attr("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on("click", (e, d) => showDetail(d))
    .on("mouseover", (e, d) => {
      tooltip.style.display = "block";
      tooltip.innerHTML = `<strong>${d.name}</strong><span class="type-badge">${d.type}</span>`;
    })
    .on("mousemove", e => {
      tooltip.style.left = (e.offsetX + 12) + "px";
      tooltip.style.top = (e.offsetY - 8) + "px";
    })
    .on("mouseout", () => { tooltip.style.display = "none"; });

  node.append("circle")
    .attr("r", d => d.type === "Group" ? 16 : d.type === "Organization" ? 14 : 10)
    .attr("fill", d => TYPE_COLOR[d.type] || "#999")
    .attr("fill-opacity", 0.85)
    .attr("stroke", "#fff")
    .attr("stroke-width", 2);

  node.append("text")
    .attr("dy", "0.32em")
    .attr("text-anchor", "middle")
    .attr("font-size", "9px")
    .attr("fill", "#fff")
    .attr("font-weight", "600")
    .attr("pointer-events", "none")
    .text(d => d.name.length > 5 ? d.name.slice(0, 4) + "…" : d.name);

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    linkLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // 범례
  const legend = document.getElementById("legend");
  legend.innerHTML = Object.entries(TYPE_COLOR)
    .map(([t, c]) => `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${TYPE_ICON[t] || ""} ${t}</div>`)
    .join("");
}

async function loadTree() {
  const res = await fetch("/api/tree");
  const tree = (await res.json()).data;
  const root = document.getElementById("tree-root");
  root.innerHTML = Object.entries(tree).map(([type, items]) => `
    <details class="tree-group" ${type === "Group" ? "open" : ""}>
      <summary>
        <span class="type-icon">${TYPE_ICON[type] || "📁"}</span>
        ${type}
        <span class="count-badge">${items.length}</span>
      </summary>
      ${items.map(e => `
        <a class="tree-item" onclick="filterByType('${type}', '${e.id}')" title="${e.name}">
          ${e.name.length > 16 ? e.name.slice(0,15)+"…" : e.name}
        </a>`).join("")}
    </details>`).join("");
}

function filterByType(type, id) {
  document.querySelectorAll(".tree-item").forEach(el => el.classList.remove("active"));
  event.target.classList.add("active");
  activeType = type;
  loadGraph();
  // 해당 노드로 카메라 이동
  const target = allNodes.find(n => n.id === id);
  if (target && target.x != null) {
    const W = canvas.clientWidth, H = canvas.clientHeight;
    svg.transition().duration(600).call(
      zoom.transform,
      d3.zoomIdentity.translate(W/2 - target.x*1.5, H/2 - target.y*1.5).scale(1.5)
    );
  }
}

function showDetail(d) {
  const panel = document.getElementById("detail-panel");
  const content = document.getElementById("detail-content");
  const neighbors = allLinks.filter(l =>
    (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
  );
  content.innerHTML = `
    <h2 style="margin:0 0 0.5rem;font-size:1.1rem">${d.name}</h2>
    <div class="type-badge" style="margin-bottom:0.8rem">${d.type}</div>
    <div class="stat-row"><span>관계 수</span><strong>${neighbors.length}</strong></div>
    <div style="margin-top:0.8rem;font-weight:600;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">연결된 관계</div>
    <div style="margin-top:0.4rem">
      ${neighbors.slice(0,10).map(l => {
        const src = l.source.id || l.source;
        const tgt = l.target.id || l.target;
        const other = src === d.id ? (l.target.name || tgt) : (l.source.name || src);
        const dir = src === d.id ? "→" : "←";
        return `<div style="padding:0.25rem 0;border-bottom:1px solid var(--line);font-size:0.78rem">
          ${dir} <strong>${other}</strong> <span style="color:var(--muted)">${l.predicate}</span>
        </div>`;
      }).join("")}
    </div>
    <a href="/ui/entities/${encodeURIComponent(d.id)}"
       style="display:block;margin-top:0.8rem;text-align:center;padding:0.4rem;border:1px solid var(--accent);border-radius:6px">
      상세 페이지 →
    </a>`;
  panel.classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("false");
  document.getElementById("detail-panel").classList.remove("open");
}

// 초기화
loadTree();
loadGraph();
document.querySelectorAll('[name=grade]').forEach(el => el.addEventListener("change", loadGraph));

// 윈도우 리사이즈
window.addEventListener("resize", () => {
  if (simulation) simulation.alpha(0.1).restart();
});
</script>
{% endblock %}
