{% extends "base.html" %}
{% block title %}그래프 탐색기 · Veristar{% endblock %}
{% block content %}
<style>
  main { max-width: none; padding: 0; }
  /* ── 상단 툴바 ─────────────────────────────────────────── */
  .graph-toolbar {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.55rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    font-size: 0.8rem;
  }
  .tb-search {
    flex: 0 0 200px;
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg); font-size: 0.8rem; font-family: var(--sans);
  }
  .tb-search:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .chip-group { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .chip {
    padding: 0.2rem 0.55rem; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--line); background: var(--bg); font-size: 0.72rem;
    user-select: none; transition: all 100ms;
  }
  .chip.on { border-color: currentColor; font-weight: 600; }
  .chip-person.on  { color: #4CAF50; background: #f0fff0; }
  .chip-group.on   { color: #2196F3; background: #e3f2fd; }
  .chip-org.on     { color: #FF9800; background: #fff3e0; }
  .chip-work.on    { color: #9C27B0; background: #f3e5f5; }
  .chip-award.on   { color: #F44336; background: #fce4ec; }
  .chip-event.on   { color: #00BCD4; background: #e0f7fa; }
  .chip-official.on { color: var(--official); background: oklch(97% 0.03 150); }
  .chip-reported.on { color: var(--reported); background: oklch(97% 0.03 75); }
  .tb-sep { width: 1px; height: 20px; background: var(--line); flex-shrink: 0; }
  .tb-reset {
    padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: none; font-size: 0.72rem; color: var(--muted);
  }
  /* ── 캔버스 ────────────────────────────────────────────── */
  .graph-canvas {
    position: relative;
    width: 100%;
    height: calc(100vh - 57px - 44px); /* header + toolbar */
    overflow: hidden;
    background: oklch(99% 0.002 260);
  }
  #graph-svg { width: 100%; height: 100%; }
  /* ── 우측 슬라이드 패널 ────────────────────────────────── */
  .detail-panel {
    position: absolute; right: 0; top: 0; bottom: 0; width: 280px;
    background: var(--surface); border-left: 1px solid var(--line);
    padding: 1rem; overflow-y: auto;
    transform: translateX(100%);
    transition: transform 250ms cubic-bezier(0.16,1,0.3,1);
    font-size: 0.82rem; z-index: 10;
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-close { float: right; cursor: pointer; color: var(--muted); font-size: 1rem; line-height: 1; }
  .stat-row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid var(--line); }
  /* ── 툴팁 ──────────────────────────────────────────────── */
  .tooltip {
    position: absolute; background: var(--surface); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 0.75rem;
    pointer-events: none; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 20; max-width: 180px;
  }
  /* ── 범례 ──────────────────────────────────────────────── */
  .legend {
    position: absolute; bottom: 0.8rem; left: 0.8rem;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.5rem 0.7rem; font-size: 0.68rem;
    display: grid; gap: 0.2rem; opacity: 0.85;
  }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  /* ── 노드 수 배지 ─────────────────────────────────────── */
  .node-count {
    position: absolute; top: 0.7rem; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 20px; padding: 0.2rem 0.8rem; font-size: 0.72rem; color: var(--muted);
  }
</style>

<!-- 툴바 -->
<div class="graph-toolbar" id="toolbar">
  <input class="tb-search" id="node-search" placeholder="노드 검색…" oninput="searchNodes(this.value)">
  <div class="tb-sep"></div>
  <span style="color:var(--muted);font-size:0.7rem">타입</span>
  <div class="chip-group" id="type-chips">
    <span class="chip chip-person on"  data-type="Person"       onclick="toggleTypeChip(this)">👤 인물</span>
    <span class="chip chip-group on"   data-type="Group"        onclick="toggleTypeChip(this)">🎵 그룹</span>
    <span class="chip chip-org on"     data-type="Organization" onclick="toggleTypeChip(this)">🏢 조직</span>
    <span class="chip chip-award on"   data-type="Award"        onclick="toggleTypeChip(this)">🏆 수상</span>
    <span class="chip chip-work on"    data-type="Work"         onclick="toggleTypeChip(this)">💿 작품</span>
    <span class="chip chip-event on"   data-type="Event"        onclick="toggleTypeChip(this)">📅 이벤트</span>
  </div>
  <div class="tb-sep"></div>
  <span style="color:var(--muted);font-size:0.7rem">등급</span>
  <div class="chip-group">
    <span class="chip chip-official on" data-grade="OFFICIAL" onclick="toggleGradeChip(this)">OFFICIAL</span>
    <span class="chip chip-reported"    data-grade="REPORTED" onclick="toggleGradeChip(this)">REPORTED</span>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-reset" onclick="resetAll()">전체 초기화</button>
</div>

<div class="graph-canvas" id="graph-canvas">
  <svg id="graph-svg"></svg>
  <div class="tooltip" id="tooltip"></div>
  <div class="legend" id="legend"></div>
  <div class="node-count" id="node-count"></div>
  <div class="detail-panel" id="detail-panel">
    <span class="detail-close" onclick="closeDetail()">✕</span>
    <div id="detail-content"></div>
  </div>
</div>

<script src="/static/d3.min.js"></script>
<script>
const TYPE_COLOR = {
  Person:'#4CAF50', Group:'#2196F3', Organization:'#FF9800',
  Work:'#9C27B0', Award:'#F44336', Event:'#00BCD4',
};
const TYPE_ICON = { Person:'👤', Group:'🎵', Organization:'🏢', Work:'💿', Award:'🏆', Event:'📅' };
const PRED_COLOR = {
  memberOf:'#1565C0', affiliatedWith:'#E65100', wonAward:'#6A1B9A',
  nominatedFor:'#880E4F', appearedIn:'#2E7D32', released:'#4527A0', collaboratedWith:'#00695C',
};

let allNodes=[], allLinks=[], simulation, selectedId=null;
let activeTypes=new Set(['Person','Group','Organization','Award','Work','Event']);
let activeGrades=new Set(['OFFICIAL']);

const svg=d3.select('#graph-svg');
const canvas=document.getElementById('graph-canvas');
const tooltip=document.getElementById('tooltip');

const zoom=d3.zoom().scaleExtent([0.05,6]).on("zoom",e=>container.attr("transform",e.transform));
svg.call(zoom);
svg.on("click",(e)=>{ if(e.target.tagName==="svg") clearSelection(); });
const container=svg.append("g");

async function loadGraph() {
  const params=new URLSearchParams();
  activeGrades.forEach(g=>params.append("grade",g));
  const res=await fetch(`/api/graph/data?${params}`);
  const data=(await res.json()).data;
  renderGraph(data.nodes, data.links);
}

function renderGraph(nodes, links) {
  allNodes=nodes; allLinks=links;
  container.selectAll("*").remove();

  const visNodes=nodes.filter(n=>activeTypes.has(n.type));
  const visIds=new Set(visNodes.map(d=>d.id));
  const visLinks=links.filter(l=>{
    const s=l.source.id||l.source, t=l.target.id||l.target;
    return visIds.has(s)&&visIds.has(t);
  });

  document.getElementById('node-count').textContent=`${visNodes.length}개 노드 · ${visLinks.length}개 관계`;

  const W=canvas.clientWidth, H=canvas.clientHeight;
  simulation=d3.forceSimulation(visNodes)
    .force("link",d3.forceLink(visLinks).id(d=>d.id).distance(80).strength(0.4))
    .force("charge",d3.forceManyBody().strength(-220))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collision",d3.forceCollide(20));

  const link=container.append("g").selectAll("line")
    .data(visLinks).join("line")
    .attr("stroke",d=>PRED_COLOR[d.predicate]||"#ccc")
    .attr("stroke-opacity",0.5)
    .attr("stroke-width",d=>d.grade==="OFFICIAL"?2:1)
    .attr("stroke-dasharray",d=>d.grade==="OFFICIAL"?null:"4,3");

  const node=container.append("g").selectAll("g").data(visNodes).join("g")
    .attr("cursor","pointer")
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on("click",(e,d)=>{e.stopPropagation();selectNode(d);})
    .on("mouseover",(e,d)=>{
      tooltip.style.display="block";
      tooltip.innerHTML=`<strong>${d.name}</strong><br><span class="type-badge">${d.type}</span>`;
    })
    .on("mousemove",e=>{tooltip.style.left=(e.offsetX+12)+"px";tooltip.style.top=(e.offsetY-8)+"px";})
    .on("mouseout",()=>tooltip.style.display="none");

  node.append("circle")
    .attr("r",d=>d.type==="Group"?16:d.type==="Organization"?13:10)
    .attr("fill",d=>TYPE_COLOR[d.type]||"#999")
    .attr("fill-opacity",0.85)
    .attr("stroke","#fff").attr("stroke-width",2)
    .attr("id",d=>"n-"+d.id.replace(/[^a-zA-Z0-9]/g,"_"));

  node.append("text")
    .attr("dy","0.32em").attr("text-anchor","middle")
    .attr("font-size","8px").attr("fill","#fff").attr("font-weight","600")
    .attr("pointer-events","none")
    .text(d=>d.name.length>5?d.name.slice(0,4)+"…":d.name);

  simulation.on("tick",()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("transform",d=>`translate(${d.x},${d.y})`);
  });

  // 범례
  const legend=document.getElementById("legend");
  legend.innerHTML=Object.entries(TYPE_COLOR)
    .filter(([t])=>activeTypes.has(t))
    .map(([t,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${TYPE_ICON[t]||""} ${t}</div>`)
    .join("");
}

function selectNode(d) {
  selectedId=d.id;
  // 하이라이트
  const neighborIds=new Set([d.id]);
  allLinks.forEach(l=>{
    const s=l.source.id||l.source, t=l.target.id||l.target;
    if(s===d.id)neighborIds.add(t);
    if(t===d.id)neighborIds.add(s);
  });
  container.selectAll("circle")
    .attr("opacity",n=>neighborIds.has(n.id)?1:0.12)
    .attr("stroke",n=>n.id===d.id?"#e53935":"#fff")
    .attr("stroke-width",n=>n.id===d.id?3.5:2);
  container.selectAll("text").attr("opacity",n=>neighborIds.has(n.id)?1:0.1);
  container.selectAll("line").attr("stroke-opacity",l=>{
    const s=l.source.id||l.source, t=l.target.id||l.target;
    return(s===d.id||t===d.id)?0.9:0.04;
  });
  // 카메라
  if(d.x!=null){
    const W=canvas.clientWidth, H=canvas.clientHeight;
    svg.transition().duration(500).call(
      zoom.transform,d3.zoomIdentity.translate(W/2-d.x*1.8,H/2-d.y*1.8).scale(1.8)
    );
  }
  showDetailPanel(d);
}

function clearSelection() {
  selectedId=null;
  container.selectAll("circle").attr("opacity",1).attr("stroke","#fff").attr("stroke-width",2);
  container.selectAll("text").attr("opacity",1);
  container.selectAll("line").attr("stroke-opacity",0.5);
  closeDetail();
}

function showDetailPanel(d) {
  const panel=document.getElementById("detail-panel");
  const neighbors=allLinks.filter(l=>{
    const s=l.source.id||l.source, t=l.target.id||l.target;
    return s===d.id||t===d.id;
  });
  document.getElementById("detail-content").innerHTML=`
    <h2 style="margin:0 0 0.4rem;font-size:1.05rem">${d.name}</h2>
    <div class="type-badge" style="margin-bottom:0.8rem">${d.type}</div>
    <div class="stat-row"><span>연결 관계</span><strong>${neighbors.length}개</strong></div>
    <div style="margin:0.8rem 0 0.4rem;font-weight:600;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted)">연결 목록</div>
    ${neighbors.slice(0,12).map(l=>{
      const s=l.source.id||l.source, t=l.target.id||l.target;
      const oname=s===d.id?(l.target.name||t):(l.source.name||s);
      const dir=s===d.id?"→":"←";
      return `<div style="padding:0.22rem 0;border-bottom:1px solid var(--line);font-size:0.77rem">
        <span style="color:var(--muted)">${dir}</span>
        <strong>${oname}</strong>
        <span style="color:var(--muted);font-size:0.7rem"> ${l.predicate}</span>
      </div>`;
    }).join("")}
    <a href="/ui/entities/${encodeURIComponent(d.id)}"
       style="display:block;margin-top:0.8rem;text-align:center;padding:0.4rem 0;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:0.82rem">
      상세 페이지 →
    </a>`;
  panel.classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
}

// ── 툴바 인터랙션 ──────────────────────────────────────────────
function toggleTypeChip(el) {
  const t=el.dataset.type;
  el.classList.toggle("on");
  if(el.classList.contains("on")) activeTypes.add(t); else activeTypes.delete(t);
  loadGraph();
}
function toggleGradeChip(el) {
  const g=el.dataset.grade;
  el.classList.toggle("on");
  if(el.classList.contains("on")) activeGrades.add(g); else activeGrades.delete(g);
  loadGraph();
}
function resetAll() {
  activeTypes=new Set(['Person','Group','Organization','Award','Work','Event']);
  activeGrades=new Set(['OFFICIAL']);
  document.querySelectorAll('.chip').forEach(c=>{
    const isReported=c.dataset.grade==='REPORTED';
    c.classList.toggle("on",!isReported);
  });
  clearSelection();
  loadGraph();
}
function searchNodes(q) {
  if(!q){clearSelection();return;}
  const found=allNodes.find(n=>n.name.toLowerCase().includes(q.toLowerCase()));
  if(found&&found.x!=null) selectNode(found);
}

// 초기 로드
loadGraph();
window.addEventListener("resize",()=>{if(simulation)simulation.alpha(0.1).restart();});
</script>
{% endblock %}
