{% extends "base.html" %}
{% block title %}Q&A · Veristar{% endblock %}
{% block content %}
<style>
  main { max-width: none; padding: 0; }
  .qa-wrap {
    display: flex; height: calc(100vh - 57px); position: relative; overflow: hidden;
  }
  /* ── 메인 채팅 영역 ────────────────────────────────────── */
  .qa-main {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    background: var(--bg); overflow: hidden;
  }
  .qa-header {
    width: 100%; max-width: 800px; padding: 0.8rem 1rem 0;
    display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
  }
  .qa-header .title-block { display: flex; flex-direction: column; min-width: 0; }
  .qa-header h1 {
    margin: 0; font-size: 1.05rem; letter-spacing: -0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 460px;
  }
  .qa-header .meta { font-size: 0.7rem; color: var(--muted); }
  .qa-toggle-btn {
    padding: 0.3rem 0.7rem; border: 1px solid var(--line); border-radius: 8px;
    background: none; cursor: pointer; font-size: 0.75rem; color: var(--muted);
    flex-shrink: 0;
  }
  .new-chat-btn {
    padding: 0.35rem 0.85rem; border: 1px solid var(--accent);
    background: var(--accent); color: #fff; border-radius: 8px;
    font-size: 0.78rem; cursor: pointer; transition: opacity 120ms;
    flex-shrink: 0; font-weight: 500;
  }
  .new-chat-btn:hover { opacity: 0.87; }
  .chat-box {
    flex: 1; overflow-y: auto; width: 100%; max-width: 800px;
    padding: 0.8rem 1rem; display: flex; flex-direction: column; gap: 0.3rem;
  }
  .msg { padding: 0.75rem 1rem; border-radius: 12px; max-width: 85%; line-height: 1.65; font-size: 0.88rem; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.assistant { background: var(--surface); border: 1px solid var(--line); align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .msg.assistant .msg-meta { margin-top: 0.4rem; padding-top: 0.35rem; border-top: 1px solid var(--line); font-size: 0.7rem; color: var(--muted); }
  .msg.system { align-self: center; color: var(--muted); font-size: 0.75rem; background: none; border: none; padding: 0.3rem; }
  .qa-input-area {
    width: 100%; max-width: 800px; padding: 0.7rem 1rem 1rem;
    flex-shrink: 0;
  }
  .qa-input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
  .qa-input-row textarea {
    flex: 1; padding: 0.65rem 0.9rem; font-size: 0.9rem; resize: none;
    border: 1px solid var(--line); border-radius: 12px; background: var(--surface);
    font-family: var(--sans); line-height: 1.5; min-height: 44px; max-height: 120px;
    overflow-y: auto;
  }
  .qa-input-row textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .send-btn {
    padding: 0.65rem 1.1rem; background: var(--accent); color: #fff;
    border: none; border-radius: 12px; cursor: pointer; font-size: 0.9rem; flex-shrink: 0;
    transition: opacity 150ms; align-self: flex-end;
  }
  .send-btn:disabled { opacity: 0.4; }
  .send-btn:hover:not(:disabled) { opacity: 0.87; }
  .typing { display: inline-flex; gap: 3px; align-items: center; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

  /* ── 사이드 패널 ──────────────────────────────────────── */
  .qa-side {
    width: 280px; flex-shrink: 0;
    background: var(--surface); border-left: 1px solid var(--line);
    overflow-y: auto; font-size: 0.8rem;
    transform: translateX(0);
    transition: width 200ms ease, transform 200ms ease;
  }
  .qa-side.collapsed { width: 0; overflow: hidden; border: none; }
  .side-section { padding: 0.8rem 0.9rem; border-bottom: 1px solid var(--line); }
  .side-section h3 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 0.5rem; }
  .example-q {
    display: block; padding: 0.32rem 0.6rem; margin: 0.2rem 0;
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    font-size: 0.78rem; cursor: pointer; transition: background 100ms;
  }
  .example-q:hover { background: oklch(92% 0.04 265); color: var(--accent); }
  /* 세션 목록 항목 */
  .session-item {
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.45rem 0.55rem; margin: 0.18rem 0;
    border: 1px solid transparent; border-radius: 8px;
    cursor: pointer; transition: background 100ms, border-color 100ms;
  }
  .session-item:hover { background: var(--bg); border-color: var(--line); }
  .session-item.active { background: var(--bg); border-color: var(--accent); }
  .session-item .s-title {
    flex: 1; min-width: 0; font-size: 0.78rem; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-item .s-meta { font-size: 0.66rem; color: var(--muted); flex-shrink: 0; }
  .session-item .s-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 0 0.25rem; font-size: 1rem; line-height: 1;
    opacity: 0; transition: opacity 100ms;
  }
  .session-item:hover .s-del { opacity: 1; }
  .session-item .s-del:hover { color: oklch(55% 0.2 25); }
  .empty-hint { color: var(--muted); font-size: 0.75rem; padding: 0.3rem 0; }
</style>

<div class="qa-wrap">
  <div class="qa-main">
    <div class="qa-header">
      <div class="title-block">
        <h1 id="current-session-title">새 대화</h1>
        <span class="meta">공식 사실 기반 · 추론 없음 · Ollama qwen3</span>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <button class="new-chat-btn" onclick="newSession()">+ 새 대화</button>
        <button class="qa-toggle-btn" id="toggle-btn" onclick="toggleSide()">메뉴 ☰</button>
      </div>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="msg system">안녕하세요! 한국 연예인에 대해 질문해 보세요.</div>
    </div>

    <div class="qa-input-area">
      <div class="qa-input-row">
        <textarea id="q-input" placeholder="예: 스트레이 키즈 멤버는?" rows="1"
          onkeydown="if(event.isComposing||event.keyCode===229)return;if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQ();}"
          oninput="autoResize(this)" autofocus></textarea>
        <button class="send-btn" id="send-btn" onclick="sendQ()">전송</button>
      </div>
    </div>
  </div>

  <!-- 사이드바 -->
  <div class="qa-side" id="qa-side">
    <div class="side-section">
      <h3>대화 목록</h3>
      <div id="session-list"></div>
    </div>
    <div class="side-section">
      <h3>예시 질문</h3>
      <a class="example-q" onclick="fillQ(this.textContent)">스트레이 키즈 멤버는?</a>
      <a class="example-q" onclick="fillQ(this.textContent)">블랙핑크가 받은 상은?</a>
      <a class="example-q" onclick="fillQ(this.textContent)">BTS는 언제 데뷔했나요?</a>
      <a class="example-q" onclick="fillQ(this.textContent)">NewJeans 소속사는?</a>
      <a class="example-q" onclick="fillQ(this.textContent)">아이유 주요 작품은?</a>
      <a class="example-q" onclick="fillQ(this.textContent)">TWICE 멤버 구성은?</a>
    </div>
  </div>
</div>

<script>
// ─── 세션 스토리지 모델 ───────────────────────────────────
// localStorage:
//   vqa_sessions = [{id, title, createdAt, messages: [{q,a,grounded,model,ts}]}]
//   vqa_current  = current session id
const SESSIONS_KEY = 'vqa_sessions';
const CURRENT_KEY = 'vqa_current';
const MAX_SESSIONS = 50;
const MAX_MSGS_PER_SESSION = 100;

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); }
  catch { return []; }
}
function saveSessions(s) {
  // 최신순 정렬, MAX_SESSIONS 한도
  s.sort((a, b) => b.createdAt - a.createdAt);
  if (s.length > MAX_SESSIONS) s.length = MAX_SESSIONS;
  localStorage.setItem(SESSIONS_KEY, JSON.stringify(s));
}
function getCurrentId() { return localStorage.getItem(CURRENT_KEY) || null; }
function setCurrentId(id) { localStorage.setItem(CURRENT_KEY, id); }

// 기존 단일 sessionStorage.vqa → 첫 세션으로 이관 (한 번만)
function migrateLegacy() {
  try {
    const legacy = sessionStorage.getItem('vqa');
    if (!legacy) return;
    const msgs = JSON.parse(legacy);
    if (Array.isArray(msgs) && msgs.length) {
      const sessions = loadSessions();
      const id = 's_' + Date.now().toString(36);
      sessions.push({
        id, createdAt: Date.now() - 1,
        title: msgs[0].q.slice(0, 30) || '이전 대화',
        messages: msgs.map(m => ({ ...m, ts: m.ts || Date.now() })),
      });
      saveSessions(sessions);
      sessionStorage.removeItem('vqa');
    }
  } catch {}
}

function getOrCreateCurrent() {
  let sessions = loadSessions();
  let curId = getCurrentId();
  let cur = sessions.find(s => s.id === curId);
  if (!cur) {
    cur = createSession(sessions);
    saveSessions(sessions);
    setCurrentId(cur.id);
  }
  return { sessions, cur };
}

function createSession(sessions) {
  const s = {
    id: 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    createdAt: Date.now(),
    title: '새 대화',
    messages: [],
  };
  sessions.unshift(s);
  return s;
}

// ─── UI 상태 ──────────────────────────────────────────────
let sideOpen = true;

function toggleSide() {
  sideOpen = !sideOpen;
  document.getElementById('qa-side').classList.toggle('collapsed', !sideOpen);
  document.getElementById('toggle-btn').textContent = sideOpen ? '메뉴 ☰' : '메뉴 ☷';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── 렌더 ─────────────────────────────────────────────────
function renderAll() {
  const { sessions, cur } = getOrCreateCurrent();
  renderCurrentSession(cur);
  renderSessionList(sessions, cur.id);
}

function renderCurrentSession(cur) {
  document.getElementById('current-session-title').textContent = cur.title;
  const box = document.getElementById('chat-box');
  box.innerHTML = '<div class="msg system">안녕하세요! 한국 연예인에 대해 질문해 보세요.</div>';
  cur.messages.forEach(t => {
    addBubble('user', t.q);
    addBubble('assistant', t.a, { grounded: t.grounded, model: t.model });
  });
  box.scrollTop = box.scrollHeight;
}

function renderSessionList(sessions, curId) {
  const list = document.getElementById('session-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-hint">없음</div>';
    return;
  }
  list.innerHTML = sessions.map(s => {
    const active = s.id === curId ? ' active' : '';
    const safeTitle = (s.title || '제목없음').replace(/[<>"']/g, c =>
      ({ '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const count = s.messages.length;
    return `<div class="session-item${active}" onclick="switchSession('${s.id}')">
      <span class="s-title" title="${safeTitle}">${safeTitle}</span>
      <span class="s-meta">${count}</span>
      <button class="s-del" onclick="event.stopPropagation();deleteSession('${s.id}')" title="삭제">×</button>
    </div>`;
  }).join('');
}

function addBubble(role, text, meta = null) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  if (role === 'assistant' && meta) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = `근거 ${meta.grounded || 0}건 · 모델: ${meta.model || '-'}`;
    div.appendChild(m);
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ─── 액션 ─────────────────────────────────────────────────
async function sendQ() {
  const input = document.getElementById('q-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addBubble('user', q);
  addTyping();
  try {
    const r = await fetch(`/api/qa?q=${encodeURIComponent(q)}`);
    const d = (await r.json()).data;
    document.getElementById('typing')?.remove();
    addBubble('assistant', d.answer, { grounded: d.grounded_in_count, model: d.model });
    const { sessions, cur } = getOrCreateCurrent();
    cur.messages.push({ q, a: d.answer, grounded: d.grounded_in_count, model: d.model, ts: Date.now() });
    if (cur.messages.length > MAX_MSGS_PER_SESSION) {
      cur.messages = cur.messages.slice(-MAX_MSGS_PER_SESSION);
    }
    // 첫 메시지면 제목 자동 설정
    if (cur.messages.length === 1 || cur.title === '새 대화') {
      cur.title = q.length > 30 ? q.slice(0, 30) + '…' : q;
    }
    saveSessions(sessions);
    renderSessionList(sessions, cur.id);
    document.getElementById('current-session-title').textContent = cur.title;
  } catch {
    document.getElementById('typing')?.remove();
    addBubble('assistant', '오류: Ollama 서버를 확인하세요.');
  } finally {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('q-input').focus();
  }
}

function fillQ(t) {
  const inp = document.getElementById('q-input');
  inp.value = t; autoResize(inp); inp.focus();
}

function newSession() {
  const sessions = loadSessions();
  // 빈 새 세션이 이미 현재면 재사용
  const cur = sessions.find(s => s.id === getCurrentId());
  if (cur && cur.messages.length === 0) { renderAll(); return; }
  const s = createSession(sessions);
  saveSessions(sessions);
  setCurrentId(s.id);
  renderAll();
  document.getElementById('q-input').focus();
}

function switchSession(id) {
  setCurrentId(id);
  renderAll();
}

function deleteSession(id) {
  let sessions = loadSessions();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions(sessions);
  // 현재 세션이 삭제됐으면 다음 세션 또는 신규 생성
  if (getCurrentId() === id) {
    if (sessions.length) setCurrentId(sessions[0].id);
    else { const s = createSession(sessions); saveSessions(sessions); setCurrentId(s.id); }
  }
  renderAll();
}

// 부트스트랩
migrateLegacy();
renderAll();
</script>
{% endblock %}
