{% extends "base.html" %}
{% block title %}Vault 브라우저 · Veristar{% endblock %}
{% block content %}
<style>
  main { max-width: none; padding: 0; }
  .vault-wrap {
    display: grid;
    grid-template-columns: 1fr 420px;
    height: calc(100vh - 57px);
  }
  /* ── 왼쪽: 검색+카드 ──────────────────────────────────── */
  .vault-list {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--line);
    overflow: hidden;
  }
  .vault-search-bar {
    padding: 0.7rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .vault-search-bar input {
    width: 100%; padding: 0.5rem 0.8rem; font-size: 0.9rem;
    border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); font-family: var(--sans); margin-bottom: 0.5rem;
  }
  .vault-search-bar input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .filter-chips { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .fchip {
    padding: 0.15rem 0.5rem; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--line); font-size: 0.7rem; user-select: none;
    background: var(--bg); transition: all 100ms;
  }
  .fchip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .fchip-high.on  { background: #2e7d32; border-color: #2e7d32; color:#fff; }
  .fchip-med.on   { background: #e65100; border-color: #e65100; color:#fff; }
  .fchip-low.on   { background: #888;    border-color: #888;    color:#fff; }
  .fchip-wiki.on  { background: #1565C0; border-color: #1565C0; color:#fff; }
  .fchip-namu.on  { background: #2E7D32; border-color: #2E7D32; color:#fff; }
  .fchip-news.on  { background: #6A1B9A; border-color: #6A1B9A; color:#fff; }
  .vault-stats {
    padding: 0.35rem 1rem; font-size: 0.72rem; color: var(--muted);
    background: var(--bg); border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  .vault-cards { overflow-y: auto; flex: 1; }
  .vault-card {
    padding: 0.7rem 1rem; border-bottom: 1px solid var(--line); cursor: pointer;
    transition: background 100ms; border-left: 3px solid transparent;
  }
  .vault-card:hover { background: oklch(96% 0.005 265); }
  .vault-card.active { background: oklch(94% 0.04 265); border-left-color: var(--accent); }
  .card-header { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; }
  .card-title { font-weight: 600; font-size: 0.85rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-badges { display: flex; gap: 0.25rem; flex-shrink: 0; }
  .src-badge { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 4px; font-weight: 600; }
  .src-wikipedia { background: #e3f2fd; color: #1565C0; }
  .src-namuwiki  { background: #e8f5e9; color: #2E7D32; }
  .src-news      { background: #f3e5f5; color: #6A1B9A; }
  .src-youtube   { background: #ffebee; color: #c62828; }
  .conf-badge { font-size: 0.63rem; padding: 0.1rem 0.3rem; border-radius: 4px; }
  .conf-high   { background: #e8f5e9; color: #2e7d32; }
  .conf-medium { background: #fff3e0; color: #e65100; }
  .conf-low    { background: #f5f5f5; color: #888; }
  .conf-unverified { background: #f5f5f5; color: #aaa; }
  .card-snippet { font-size: 0.75rem; color: var(--muted); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* ── 오른쪽: 문서 뷰어 ────────────────────────────────── */
  .vault-viewer {
    overflow-y: auto; background: var(--bg);
    display: flex; flex-direction: column;
  }
  .viewer-header {
    padding: 0.8rem 1.2rem 0.6rem;
    background: var(--surface); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .viewer-header h2 { margin: 0 0 0.3rem; font-size: 1rem; letter-spacing: -0.01em; }
  .viewer-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; font-size: 0.72rem; color: var(--muted); }
  .viewer-meta a { color: var(--accent); word-break: break-all; }
  .viewer-body {
    padding: 1rem 1.4rem;
    font-size: 0.83rem; line-height: 1.7; flex: 1;
  }
  .viewer-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--muted); text-align: center; padding: 2rem;
  }
  .viewer-empty .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  /* 마크다운 */
  .viewer-body h1{font-size:1.15rem;margin:1rem 0 0.3rem}
  .viewer-body h2{font-size:1rem;margin:0.8rem 0 0.25rem}
  .viewer-body h3{font-size:0.9rem;margin:0.6rem 0 0.2rem}
  .viewer-body p{margin:0.4rem 0}
  .viewer-body strong{font-weight:700}
</style>

<div class="vault-wrap">
  <!-- 왼쪽 -->
  <div class="vault-list">
    <div class="vault-search-bar">
      <input id="vault-q" placeholder="문서 제목·내용 검색…" oninput="filterDocs()" autofocus>
      <div class="filter-chips">
        <span class="fchip fchip-high on"  data-f="conf:high"       onclick="toggleFilter(this)">HIGH</span>
        <span class="fchip fchip-med on"   data-f="conf:medium"     onclick="toggleFilter(this)">MED</span>
        <span class="fchip fchip-low on"   data-f="conf:low"        onclick="toggleFilter(this)">LOW</span>
        <span class="fchip"                data-f="conf:unverified" onclick="toggleFilter(this)">미검증</span>
        <span class="fchip" style="margin-left:0.3rem">|</span>
        <span class="fchip fchip-wiki on"  data-f="src:wikipedia"   onclick="toggleFilter(this)">📖 Wikipedia</span>
        <span class="fchip fchip-namu on"  data-f="src:namuwiki"    onclick="toggleFilter(this)">📝 나무위키</span>
        <span class="fchip fchip-news on"  data-f="src:news"        onclick="toggleFilter(this)">📰 뉴스</span>
      </div>
    </div>
    <div class="vault-stats" id="vault-stats">로딩 중…</div>
    <div class="vault-cards" id="vault-cards"></div>
  </div>

  <!-- 오른쪽 뷰어 -->
  <div class="vault-viewer" id="vault-viewer">
    <div class="viewer-empty">
      <div class="icon">📄</div>
      <div>왼쪽에서 문서를 선택하세요.</div>
    </div>
  </div>
</div>

<script>
const SRC_LABEL = { wikipedia:'📖', namuwiki:'📝', news:'📰', youtube:'▶️', instagram:'📷', twitter:'🐦' };
const SRC_CLASS = { wikipedia:'src-wikipedia', namuwiki:'src-namuwiki', news:'src-news' };

let allDocs=[], activeFilters=new Set([
  'conf:high','conf:medium','conf:low','src:wikipedia','src:namuwiki','src:news'
]);

async function loadDocs() {
  const r=await fetch('/api/vault/docs?limit=2000');
  allDocs=(await r.json()).data;
  filterDocs();
}

function toggleFilter(el) {
  const f=el.dataset.f;
  if(f==="|") return;
  el.classList.toggle("on");
  if(el.classList.contains("on")) activeFilters.add(f); else activeFilters.delete(f);
  filterDocs();
}

function filterDocs() {
  const q=(document.getElementById('vault-q').value||"").trim().toLowerCase();
  const allowConf=new Set([...activeFilters].filter(f=>f.startsWith('conf:')).map(f=>f.slice(5)));
  const allowSrc =new Set([...activeFilters].filter(f=>f.startsWith('src:')).map(f=>f.slice(4)));

  let shown=allDocs.filter(d=>{
    if(!allowConf.has(d.confidence)) return false;
    if(!allowSrc.has(d.source_type)) return false;
    if(q && !d.title.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('vault-stats').textContent=
    `${shown.length}건 표시 / 전체 ${allDocs.length}건`;

  const cards=document.getElementById('vault-cards');
  if(!shown.length){
    cards.innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted);font-size:0.82rem">결과 없음 — 필터를 조정하세요.</div>';
    return;
  }
  cards.innerHTML=shown.slice(0,200).map(d=>{
    const srcCls=SRC_CLASS[d.source_type]||'';
    const confCls=`conf-${d.confidence}`;
    const snippet=(d.snippet||'').replace(/\n/g,' ').slice(0,120);
    return `<div class="vault-card" id="card-${CSS.escape(d.id)}" onclick="selectDoc('${d.id.replace(/'/g,"\\'")}')">
      <div class="card-header">
        <div class="card-title">${d.title}</div>
        <div class="card-badges">
          <span class="src-badge ${srcCls}">${SRC_LABEL[d.source_type]||'📄'} ${d.source_type}</span>
          <span class="conf-badge ${confCls}">${d.confidence}</span>
        </div>
      </div>
      ${snippet?`<div class="card-snippet">${snippet}</div>`:''}
    </div>`;
  }).join('');

  if(shown.length>200) cards.innerHTML+=`<div style="padding:0.8rem;text-align:center;color:var(--muted);font-size:0.75rem">상위 200건 표시 중 (검색어로 좁혀보세요)</div>`;
}

async function selectDoc(id) {
  document.querySelectorAll('.vault-card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('card-'+CSS.escape(id));
  if(card){card.classList.add('active');card.scrollIntoView({block:'nearest'});}

  const r=await fetch(`/ui/vault/doc?id=${encodeURIComponent(id)}`);
  const html=await r.text();
  const doc=allDocs.find(d=>d.id===id);

  const viewer=document.getElementById('vault-viewer');
  viewer.innerHTML=`
    <div class="viewer-header">
      <h2>${doc?doc.title:id}</h2>
      <div class="viewer-meta">
        ${doc?`<span class="src-badge ${SRC_CLASS[doc.source_type]||''}">${SRC_LABEL[doc.source_type]||'📄'} ${doc.source_type}</span>`:''}
        ${doc?`<span class="conf-badge conf-${doc.confidence}">${doc.confidence}</span>`:''}
        ${doc&&doc.published?`<span>${doc.published}</span>`:''}
        ${doc?`<a href="${doc.source_url}" target="_blank" style="font-size:0.7rem">원문 →</a>`:''}
      </div>
    </div>
    <div class="viewer-body">${html}</div>`;
}

loadDocs();
</script>
{% endblock %}
