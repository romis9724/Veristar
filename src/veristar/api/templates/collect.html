{% extends "base.html" %}
{% block title %}데이터 파이프라인 · Veristar{% endblock %}
{% block content %}
<style>
  main { max-width: none; padding: 0; }
  .collect-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 57px);
  }
  /* 왼쪽 설정 패널 */
  .config-panel {
    background: var(--surface);
    border-right: 1px solid var(--line);
    padding: 1.2rem;
    overflow-y: auto;
    font-size: 0.82rem;
  }
  .config-panel h2 { font-size: 0.9rem; margin: 0 0 1rem; font-weight: 700; }
  .config-section { margin-bottom: 1.2rem; }
  .config-section h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); margin: 0 0 0.4rem;
  }
  .check-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.2rem 0; cursor: pointer; }
  .check-item input { accent-color: var(--accent); }
  .range-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
  .range-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .range-val { font-family: var(--mono); font-size: 0.75rem; min-width: 2rem; text-align: right; }
  .run-btn {
    width: 100%; padding: 0.8rem; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; cursor: pointer; font-size: 0.95rem;
    font-weight: 600; letter-spacing: -0.01em; transition: opacity 150ms;
  }
  .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .run-btn:hover:not(:disabled) { opacity: 0.88; }
  .stop-btn {
    width: 100%; padding: 0.5rem; background: none; color: #c62828;
    border: 1px solid #c62828; border-radius: 10px; cursor: pointer;
    font-size: 0.8rem; margin-top: 0.4rem; display: none;
  }

  /* 오른쪽 에이전트 터미널 */
  .agent-panel {
    background: oklch(12% 0.01 260);
    color: oklch(88% 0.02 120);
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.65;
    overflow-y: auto;
    padding: 1.2rem 1.4rem;
    display: flex;
    flex-direction: column;
  }
  .agent-panel:empty::before {
    content: "▌ 왼쪽에서 파이프라인을 시작하세요.";
    color: oklch(45% 0.01 260);
    font-style: italic;
  }
  /* 메시지 타입별 스타일 */
  .msg { display: flex; gap: 0.6rem; margin: 0.15rem 0; }
  .msg-header {
    color: oklch(80% 0.18 260); font-weight: 700; font-size: 0.88rem;
    margin: 0.8rem 0 0.4rem; border-top: 1px solid oklch(22% 0.02 260);
    padding-top: 0.5rem;
  }
  .msg-step {
    color: oklch(85% 0.2 265); font-weight: 600;
  }
  .msg-step .icon { font-size: 1rem; }
  .msg-step-done { color: oklch(75% 0.2 145); }
  .msg-step-error { color: oklch(65% 0.22 25); }
  .msg-log-info { color: oklch(78% 0.03 260); }
  .msg-log-warn { color: oklch(78% 0.18 75); }
  .msg-log-error { color: oklch(65% 0.22 25); }
  .msg-progress {
    color: oklch(60% 0.03 260);
  }
  .progress-bar-wrap {
    background: oklch(22% 0.01 260); border-radius: 3px; height: 4px;
    width: 120px; display: inline-block; vertical-align: middle; margin: 0 0.4rem;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 3px; background: var(--accent);
    transition: width 200ms;
  }
  .msg-done {
    color: oklch(82% 0.22 145); font-weight: 700;
    border: 1px solid oklch(35% 0.1 145); border-radius: 8px;
    padding: 0.6rem 0.8rem; margin-top: 0.8rem;
    background: oklch(16% 0.04 145);
  }
  /* 타이핑 커서 */
  .cursor {
    display: inline-block; width: 8px; height: 14px;
    background: oklch(80% 0.18 260); vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  /* 스피너 */
  .spinner {
    display: inline-block; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  /* 요약 카드 */
  .summary-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem;
    margin-top: 0.5rem;
  }
  .summary-card {
    background: oklch(18% 0.04 145); border: 1px solid oklch(32% 0.1 145);
    border-radius: 6px; padding: 0.5rem 0.7rem;
  }
  .summary-card .val { font-size: 1.2rem; font-weight: 700; }
  .summary-card .lbl { font-size: 0.65rem; color: oklch(60% 0.03 260); }
  /* 타임스탬프 */
  .ts { color: oklch(40% 0.01 260); font-size: 0.72rem; flex-shrink: 0; }
  /* 최근 배치 (cron) */
  .cron-block { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--line); }
  .cron-block h3 {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); margin: 0 0 0.5rem; display: flex; justify-content: space-between;
  }
  .cron-block h3 .refresh-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.85rem; padding: 0; line-height: 1;
  }
  .cron-next {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem;
  }
  .cron-next strong { color: var(--ink); }
  .batch-item {
    padding: 0.4rem 0.55rem; margin: 0.25rem 0;
    border: 1px solid var(--line); border-radius: 6px;
    font-size: 0.75rem; cursor: pointer; transition: background 100ms;
  }
  .batch-item:hover { background: var(--bg); }
  .batch-item .b-head {
    display: flex; justify-content: space-between; gap: 0.4rem;
  }
  .batch-item .b-time { color: var(--ink); font-weight: 500; }
  .batch-item .b-status { font-size: 0.65rem; padding: 0.05rem 0.4rem; border-radius: 999px; }
  .b-status.done { background: oklch(95% 0.07 145); color: oklch(45% 0.18 145); }
  .b-status.running { background: oklch(95% 0.07 75); color: oklch(45% 0.18 75); }
  .batch-item .b-meta { color: var(--muted); font-size: 0.68rem; margin-top: 0.15rem; }
  .batch-steps {
    display: none; margin-top: 0.5rem; padding-top: 0.4rem;
    border-top: 1px dashed var(--line); font-family: var(--mono);
    font-size: 0.68rem; max-height: 220px; overflow-y: auto;
  }
  .batch-item.open .batch-steps { display: block; }
  .step-line { color: var(--muted); padding: 0.08rem 0; }
  .step-line strong { color: var(--ink); }
</style>

<div class="collect-layout">
  <!-- 설정 패널 (압축형) -->
  <div class="config-panel">
    <!-- 빠른 실행 버튼 — 항상 표시 -->
    <div style="padding:0.8rem 0.9rem;border-bottom:1px solid var(--line)">
      <button class="run-btn" id="run-btn" onclick="startPipeline()" style="margin-bottom:0.4rem">
        ▶ 파이프라인 시작
      </button>
      <div style="display:flex;gap:0.3rem">
        <button onclick="quickRun('verify,sync,migrate')"
          style="flex:1;padding:0.35rem;border:1px solid var(--accent);border-radius:6px;background:none;cursor:pointer;font-size:0.73rem;color:var(--accent);font-weight:600">
          🔍 검증+승격+동기화
        </button>
        <button onclick="quickRun('migrate')"
          style="flex:1;padding:0.35rem;border:1px solid var(--line);border-radius:6px;background:none;cursor:pointer;font-size:0.73rem">
          🐘 PG만
        </button>
      </div>
      <button class="stop-btn" id="stop-btn" onclick="stopPipeline()">■ 중단</button>
    </div>

    <!-- 세부 설정 — 접기/펼치기 -->
    <details style="padding:0">
      <summary style="padding:0.55rem 0.9rem;cursor:pointer;font-size:0.78rem;font-weight:600;color:var(--muted);list-style:none;display:flex;align-items:center;gap:0.4rem">
        <span>⚙</span> 세부 설정
      </summary>
      <div style="padding:0.5rem 0.9rem 0.8rem">
        <div class="config-section">
          <h3>실행 단계</h3>
          <label class="check-item"><input type="checkbox" id="step-collect" checked> 📥 수집</label>
          <label class="check-item"><input type="checkbox" id="step-verify" checked> 🔍 검증</label>
          <label class="check-item"><input type="checkbox" id="step-sync" checked> 📊 승격</label>
          <label class="check-item"><input type="checkbox" id="step-migrate" checked> 🐘 동기화</label>
        </div>
        <div class="config-section">
          <h3>수집 소스</h3>
          <label class="check-item"><input type="checkbox" id="src-wiki" checked> 📖 Wikipedia</label>
          <label class="check-item"><input type="checkbox" id="src-namu" checked> 📝 나무위키</label>
          <label class="check-item"><input type="checkbox" id="src-news" checked> 📰 뉴스</label>
        </div>
        <div class="config-section">
          <h3>수집 한도</h3>
          <div class="range-row">
            <input type="range" id="limit-range" min="10" max="500" value="50" step="10"
              oninput="document.getElementById('limit-val').textContent=this.value">
            <span class="range-val" id="limit-val">50</span>건
          </div>
        </div>
      </div>
    </details>

    <!-- 최근 cron 배치 -->
    <div class="cron-block">
      <h3>
        최근 자동 배치 (cron)
        <button class="refresh-btn" onclick="loadCronBatches()" title="새로고침">↻</button>
      </h3>
      <div class="cron-next" id="cron-next">로딩...</div>
      <div id="cron-batches"></div>
    </div>
  </div>

  <!-- 에이전트 터미널 -->
  <div class="agent-panel" id="agent-panel"></div>
</div>

<script>
let evtSource = null;
let startTime = null;

function ts() {
  return new Date().toLocaleTimeString('ko-KR', {hour12:false});
}

function addMsg(html, extraClass='') {
  const panel = document.getElementById('agent-panel');
  const div = document.createElement('div');
  div.className = `msg ${extraClass}`;
  div.innerHTML = `<span class="ts">[${ts()}]</span><span>${html}</span>`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function addRaw(html) {
  const panel = document.getElementById('agent-panel');
  panel.insertAdjacentHTML('beforeend', html);
  panel.scrollTop = panel.scrollHeight;
}

function startPipeline() {
  const steps = ['collect','verify','sync','migrate']
    .filter(s => document.getElementById(`step-${s}`)?.checked)
    .join(',');
  const sources = ['wiki','namu','news']
    .filter(s => document.getElementById(`src-${s}`)?.checked)
    .map(s => ({'wiki':'wikipedia','namu':'namuwiki','news':'news'}[s]))
    .join(',');
  const limit = document.getElementById('limit-range').value;

  runPipeline(steps, sources, limit);
}

function quickRun(steps) {
  const sources = ['wikipedia','namuwiki','news'].join(',');
  runPipeline(steps, sources, 50);
}

function runPipeline(steps, sources, limit) {
  if (evtSource) evtSource.close();

  document.getElementById('agent-panel').innerHTML = '';
  document.getElementById('run-btn').disabled = true;
  document.getElementById('stop-btn').style.display = 'block';

  startTime = Date.now();

  addRaw(`<div class="msg-header">
    ╔══════════════════════════════════════════════════════╗
    ║  🤖 Veristar 데이터 파이프라인                          ║
    ║  단계: ${steps.padEnd(35)} ║
    ╚══════════════════════════════════════════════════════╝
  </div>`);

  const params = new URLSearchParams({steps, sources, limit});
  evtSource = new EventSource(`/api/pipeline/stream?${params}`);

  let _pipelineDone = false;  // done 수신 여부

  evtSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'done') _pipelineDone = true;
    handleMsg(msg);
  };

  evtSource.onerror = () => {
    // done 메시지를 이미 받은 뒤 서버가 스트림을 닫으면 정상 종료
    if (_pipelineDone) {
      evtSource.close();
      cleanup();
      return;
    }
    // 실행 중 예기치 않은 끊김만 경고 표시
    addMsg('⚠️ 연결이 끊겼습니다. 재접속하면 로그를 복원합니다.', 'msg-log-warn');
    cleanup();
  };
}

function handleMsg(msg) {
  const panel = document.getElementById('agent-panel');
  switch(msg.type) {
    case 'step':
      addRaw(`
<div class="msg msg-step">
  <span class="ts">[${ts()}]</span>
  <span>
    <span class="spinner">⟳</span>
    <strong>${msg.icon || '▶'} ${msg.name}</strong>
    ${msg.detail ? `<span style="color:oklch(55% 0.02 260);font-size:0.75rem"> — ${msg.detail}</span>` : ''}
  </span>
</div>`);
      break;

    case 'step_done':
      addRaw(`
<div class="msg msg-step-done">
  <span class="ts">[${ts()}]</span>
  <span>✅ <strong>${msg.name}</strong> 완료 — ${msg.msg || ''}</span>
</div>`);
      break;

    case 'step_error':
      addRaw(`
<div class="msg msg-step-error">
  <span class="ts">[${ts()}]</span>
  <span>❌ <strong>${msg.name}</strong> 오류: ${msg.msg || ''}</span>
</div>`);
      break;

    case 'log':
      const cls = {'info':'msg-log-info','warn':'msg-log-warn','error':'msg-log-error'}[msg.level] || 'msg-log-info';
      addMsg((msg.msg || ''), cls);
      break;

    case 'progress': {
      const pct = Math.round((msg.current / msg.total) * 100);
      const existing = document.getElementById('prog-bar');
      if (existing) existing.remove();
      addRaw(`
<div class="msg msg-progress" id="prog-bar">
  <span class="ts">[${ts()}]</span>
  <span>
    ${msg.current}/${msg.total}
    <span class="progress-bar-wrap">
      <span class="progress-bar-fill" style="width:${pct}%"></span>
    </span>
    ${pct}% — <em style="color:oklch(75% 0.15 200)">${(msg.label||'').slice(0,30)}</em>
  </span>
</div>`);
      break;
    }

    case 'done':
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      const s = msg.summary || {};
      addRaw(`
<div class="msg-done">
  <div style="margin-bottom:0.5rem">🎉 파이프라인 완료 — ${elapsed}초</div>
  <div class="summary-grid">
    <div class="summary-card">
      <div class="val">${s.vault_total ?? '-'}</div>
      <div class="lbl">vault 총 문서</div>
    </div>
    <div class="summary-card">
      <div class="val" style="color:oklch(75% 0.2 145)">${s.verified_high ?? '-'}</div>
      <div class="lbl">HIGH 검증</div>
    </div>
    <div class="summary-card">
      <div class="val" style="color:oklch(55% 0.02 260)">${s.unverified ?? '-'}</div>
      <div class="lbl">미검증 대기</div>
    </div>
  </div>
</div>`);
      cleanup();
      break;
  }
  panel.scrollTop = panel.scrollHeight;
}

function stopPipeline() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  addMsg('⏹ 사용자 중단', 'msg-log-warn');
  cleanup();
}

function cleanup() {
  document.getElementById('run-btn').disabled = false;
  document.getElementById('stop-btn').style.display = 'none';
}

// ── 페이지 로드 시: 서버 로그 복원 ────────────────────────────────────────────
async function restoreIfRunning() {
  try {
    const r = await fetch('/api/pipeline/logs');
    const d = (await r.json()).data;

    if (!d.task_id || !d.logs.length) return;

    // 이전 로그가 있으면 복원
    document.getElementById('agent-panel').innerHTML = '';
    addRaw(`<div class="msg-header" style="color:oklch(65% 0.1 75)">
      ← 실행 이력 복원 (task: ${d.task_id})
    </div>`);

    for (const msg of d.logs) {
      handleMsg(msg);
    }

    if (d.status === 'running') {
      // 아직 실행 중 → SSE 재연결
      document.getElementById('run-btn').disabled = true;
      document.getElementById('stop-btn').style.display = 'block';
      addMsg('← 파이프라인 실행 중 — 스트림 재연결', 'msg-log-info');

      evtSource = new EventSource(`/api/pipeline/stream`);
      evtSource.onmessage = (e) => { handleMsg(JSON.parse(e.data)); };
      evtSource.onerror = () => { addMsg('⚠️ 연결 끊김', 'msg-log-warn'); cleanup(); };
    }
  } catch(_) {}
}

restoreIfRunning();

// ─── 최근 cron 배치 ──────────────────────────────────────
async function loadCronBatches() {
  try {
    const r = await fetch('/api/pipeline/cron-batches?limit=5');
    const d = (await r.json()).data;
    document.getElementById('cron-next').innerHTML =
      d.log_exists
        ? `다음 실행 예정: <strong>${d.next_run}</strong>`
        : `다음 실행 예정: <strong>${d.next_run}</strong> · <span style="color:oklch(65% 0.18 75)">아직 실행 이력 없음</span>`;
    const box = document.getElementById('cron-batches');
    if (!d.batches.length) {
      box.innerHTML = '<div style="font-size:0.72rem;color:var(--muted);padding:0.3rem 0">— 아직 배치 없음 —</div>';
      return;
    }
    box.innerHTML = d.batches.map((b, i) => {
      const stepCount = (b.steps || []).length;
      const running = b.running;
      const status = running ? 'running' : 'done';
      const statusLabel = running ? '실행 중' : '완료';
      const duration = (b.started_at && b.finished_at)
        ? ` · ${diffMin(b.started_at, b.finished_at)}`
        : '';
      const stepsHtml = (b.steps || []).map(s => {
        const safe = (s.msg || '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
        return `<div class="step-line"><strong>${s.ts || ''}</strong> ${safe}</div>`;
      }).join('');
      return `<div class="batch-item" onclick="this.classList.toggle('open')">
        <div class="b-head">
          <span class="b-time">${b.started_at || '?'}</span>
          <span class="b-status ${status}">${statusLabel}</span>
        </div>
        <div class="b-meta">${stepCount}단계${duration}</div>
        <div class="batch-steps">${stepsHtml || '— 단계 로그 없음 —'}</div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('cron-next').innerHTML =
      `<span style="color:oklch(65% 0.22 25)">로드 실패</span>`;
  }
}

function diffMin(start, end) {
  try {
    const s = new Date(start.replace(' ', 'T'));
    const e = new Date(end.replace(' ', 'T'));
    const mins = Math.round((e - s) / 60000);
    return mins < 60 ? `${mins}분` : `${Math.floor(mins/60)}시 ${mins%60}분`;
  } catch { return ''; }
}

loadCronBatches();
setInterval(loadCronBatches, 60000); // 1분마다 자동 새로고침
</script>
{% endblock %}
