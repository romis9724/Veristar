# 도메인 → SourceType + Grade 매핑
#
# 외부 검색(네이버 등)으로 발견된 URL은 도메인을 키로 이 파일을 조회해
# 등급을 결정한다. CLAUDE.md §4-1·§4-3 정합.
#
# 등급 결정 우선순위:
#   1. 정확 매칭(domain.tld)
#   2. 서브도메인 매칭(*.domain.tld)
#   3. 기본값(default) — RUMOR
#
# 등급 정의:
#   OFFICIAL  : 당사자(소속사·방송사·아티스트 공식 채널)가 직접 발표
#   REPORTED  : 주요 언론사가 보도 (사실 확인 가능하나 1차 출처 아님)
#   RUMOR     : 커뮤니티·블로그·미확인 (vault 저장만, 답변 입력 금지)

