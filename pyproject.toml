[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "veristar"
version = "0.1.0"
description = "출처 등급으로 검증한 연예 지식그래프 + 콘텐츠 생성 시스템"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/veristar"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
mypy_path = "src"
packages = ["veristar"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "--cov=veristar --cov-report=term-missing"

[tool.coverage.run]
source = ["veristar"]

[tool.coverage.report]
fail_under = 80
